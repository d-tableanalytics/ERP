name: Deploy ERP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: DTA_ERP

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug repo structure
        run: |
          pwd
          ls -la
          find .. -maxdepth 3 -name package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Create archive
        run: tar -czf dist.tar.gz dist

      - name: Create backend archive
        working-directory: .
        run: |
          tar \
            --exclude='Backend/node_modules' \
            --exclude='Backend/.env' \
            --exclude='Backend/*.log' \
            -czf backend.tar.gz Backend

      - name: Setup SSH
        working-directory: .
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload archive to server
        run: scp dist.tar.gz ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/dist.tar.gz

      - name: Upload backend archive to server
        working-directory: .
        run: scp backend.tar.gz ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/backend.tar.gz

      - name: Deploy on server
        working-directory: .
        env:
          SERVER_BACKEND_DIR: ${{ secrets.SERVER_BACKEND_DIR }}
          BACKEND_RESTART_COMMAND: ${{ secrets.BACKEND_RESTART_COMMAND }}
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            set -e
            BACKEND_DIR='${SERVER_BACKEND_DIR:-/var/www/erp-backend}'

            sudo mkdir -p /var/www/erp &&
            sudo rm -rf /var/www/erp/* &&
            sudo tar -xzf /tmp/dist.tar.gz -C /var/www/erp --strip-components=1 &&
            rm -f /tmp/dist.tar.gz &&
            sudo chown -R www-data:www-data /var/www/erp &&
            sudo chmod -R 755 /var/www/erp &&

            sudo mkdir -p \"\$BACKEND_DIR\" &&
            sudo find \"\$BACKEND_DIR\" -mindepth 1 -maxdepth 1 ! -name '.env' -exec rm -rf {} + &&
            sudo tar -xzf /tmp/backend.tar.gz -C \"\$BACKEND_DIR\" --strip-components=1 &&
            rm -f /tmp/backend.tar.gz &&
            cd \"\$BACKEND_DIR\" &&
            if [ ! -f .env ]; then
              echo \"Missing backend .env at \$BACKEND_DIR/.env\"
              exit 1
            fi &&
            sudo npm ci --omit=dev &&
            if [ -n '${BACKEND_RESTART_COMMAND}' ]; then
              ${BACKEND_RESTART_COMMAND}
            elif command -v pm2 >/dev/null 2>&1; then
              if pm2 describe erp-backend >/dev/null 2>&1; then
                pm2 restart erp-backend --update-env
              else
                pm2 start Index.js --name erp-backend
              fi
              pm2 save || true
            else
              sudo systemctl restart erp-backend
            fi &&

            sudo nginx -t &&
            sudo systemctl reload nginx
          "
