name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── CI ───────────────────────────────────────────────────────────────────
  ci:
    name: CI — Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: DTA_ERP/package-lock.json

      - name: Install frontend deps
        working-directory: DTA_ERP
        run: npm ci

      - name: Lint frontend
        working-directory: DTA_ERP
        run: npm run lint

      - name: Build frontend (smoke test)
        working-directory: DTA_ERP
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Install backend deps
        working-directory: Backend
        run: npm install --omit=dev

  # ─── CD ───────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: DTA_ERP/package-lock.json

      - name: Install frontend deps
        working-directory: DTA_ERP
        run: npm ci

      - name: Build frontend
        working-directory: DTA_ERP
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Create frontend archive
        working-directory: DTA_ERP
        run: tar -czf dist.tar.gz dist

      - name: Create backend archive
        run: |
          tar \
            --exclude='Backend/node_modules' \
            --exclude='Backend/.env' \
            --exclude='Backend/*.log' \
            -czf backend.tar.gz Backend

      - name: Setup SSH
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          # Fail early with a clear message if any required secret is missing.
          missing=""
          [ -z "$SERVER_SSH_KEY" ] && missing="$missing SERVER_SSH_KEY"
          [ -z "$SERVER_HOST" ]    && missing="$missing SERVER_HOST"
          [ -z "$SERVER_USER" ]    && missing="$missing SERVER_USER"
          if [ -n "$missing" ]; then
            echo "::error::Missing required GitHub secret(s):$missing"
            echo "Add them under: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Best-effort host key fetch. Don't fail the step if it can't connect —
          # let the scp/ssh steps surface the real error (timeout / refused / auth).
          if ! ssh-keyscan -T 10 -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
            echo "::warning::ssh-keyscan could not reach $SERVER_HOST:22 within 10s — relying on accept-new host key policy"
          fi

      - name: Upload archives to server
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=accept-new -o ConnectTimeout=20"
          scp $SSH_OPTS DTA_ERP/dist.tar.gz ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/dist.tar.gz
          scp $SSH_OPTS backend.tar.gz ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/backend.tar.gz

      - name: Deploy on server
        env:
          SERVER_BACKEND_DIR: ${{ secrets.SERVER_BACKEND_DIR }}
          BACKEND_RESTART_COMMAND: ${{ secrets.BACKEND_RESTART_COMMAND }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            set -e
            BACKEND_DIR='\${SERVER_BACKEND_DIR:-/home/ubuntu/ERP/Backend}'

            # ── Frontend ──
            sudo mkdir -p /var/www/erp
            sudo rm -rf /var/www/erp/*
            sudo tar -xzf /tmp/dist.tar.gz -C /var/www/erp --strip-components=1
            rm -f /tmp/dist.tar.gz
            sudo chown -R www-data:www-data /var/www/erp
            sudo chmod -R 755 /var/www/erp

            # ── Backend ──
            sudo mkdir -p \"\$BACKEND_DIR\"
            sudo find \"\$BACKEND_DIR\" -mindepth 1 -maxdepth 1 ! -name '.env' -exec rm -rf {} +
            sudo tar -xzf /tmp/backend.tar.gz -C \"\$BACKEND_DIR\" --strip-components=1
            rm -f /tmp/backend.tar.gz
            cd \"\$BACKEND_DIR\"
            [ -f .env ] || { echo 'ERROR: missing .env — create it on the server before deploying'; exit 1; }
            sudo npm ci --omit=dev

            # ── Restart backend ──
            if [ -n '\${BACKEND_RESTART_COMMAND}' ]; then
              eval '\${BACKEND_RESTART_COMMAND}'
            elif command -v pm2 >/dev/null 2>&1; then
              if pm2 describe backend >/dev/null 2>&1; then
                pm2 restart backend --update-env
              else
                pm2 start Index.js --name backend
              fi
              pm2 save || true
            else
              sudo systemctl restart backend
            fi

            # ── Reload nginx ──
            sudo nginx -t && sudo systemctl reload nginx
          "
